# Host nginx — copy into sites-available (e.g. /etc/nginx/sites-available/maemo-compliance)
# Certbot: certificates under /etc/letsencrypt/live/maemo-compliance.co.za/
# Docker binds API on host 8090 and portal static/nginx on 3020 (see docker-compose.prod.yml).

upstream maemo_compliance_portal {
    server 127.0.0.1:3020;
    keepalive 32;
}

upstream maemo_compliance_api {
    server 127.0.0.1:8090;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name maemo-compliance.co.za www.maemo-compliance.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maemo-compliance.co.za www.maemo-compliance.co.za;

    ssl_certificate     /etc/letsencrypt/live/maemo-compliance.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maemo-compliance.co.za/privkey.pem;

    location / {
        proxy_pass http://maemo_compliance_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.maemo-compliance.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.maemo-compliance.co.za;

    ssl_certificate     /etc/letsencrypt/live/maemo-compliance.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maemo-compliance.co.za/privkey.pem;

    location / {
        proxy_pass http://maemo_compliance_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
