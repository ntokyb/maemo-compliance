# Production stack — images from GHCR.
# Repo on server: /opt/maemo-compliance/app/docker-compose.prod.yml
# Env file:        /opt/maemo-compliance/.env
#
# Compose service name for Postgres is "postgres" (not the container_name). Use Host=postgres in
# ConnectionStrings__MaemoDatabase. Required keys include ConnectionStrings__MaemoDatabase,
# POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, AZURE_AUTHORITY, AZURE_AUDIENCE.
#
# Run: docker compose --env-file /opt/maemo-compliance/.env -f docker-compose.prod.yml up -d
# Service names for partial start: postgres | api | workers | frontend

networks:
  maemo-compliance-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: maemo-compliance-postgres
    restart: unless-stopped
    env_file: /opt/maemo-compliance/.env
    volumes:
      - maemo_compliance_postgres_data:/var/lib/postgresql/data
    networks:
      - maemo-compliance-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/ntokyb/maemo-compliance-api:latest
    container_name: maemo-compliance-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:8090:8080'
    env_file: /opt/maemo-compliance/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - maemo_compliance_files:/app/files
    networks:
      - maemo-compliance-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  workers:
    image: ghcr.io/ntokyb/maemo-compliance-workers:latest
    container_name: maemo-compliance-workers
    restart: unless-stopped
    env_file: /opt/maemo-compliance/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - maemo_compliance_files:/app/files
    networks:
      - maemo-compliance-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/ntokyb/maemo-compliance-portal:latest
    container_name: maemo-compliance-portal
    restart: unless-stopped
    ports:
      - '127.0.0.1:3020:80'
    networks:
      - maemo-compliance-network
    depends_on:
      api:
        condition: service_started

volumes:
  maemo_compliance_postgres_data:
  maemo_compliance_files:
