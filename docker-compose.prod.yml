# Production stack — images from GHCR; env in /opt/maemo-compliance/.env
# Repo path on server: /opt/maemo-compliance/app/docker-compose.prod.yml
# Nginx on host terminates TLS → 127.0.0.1:3020 (portal), 127.0.0.1:8090 (API).

networks:
  maemo-compliance-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: maemo-compliance-postgres
    restart: unless-stopped
    env_file: /opt/maemo-compliance/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maemo_compliance}
      POSTGRES_USER: ${POSTGRES_USER:-maemo_compliance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in /opt/maemo-compliance/.env}
    volumes:
      - maemo_compliance_postgres_data:/var/lib/postgresql/data
    networks:
      - maemo-compliance-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maemo_compliance -d maemo_compliance || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/ntokyb/maemo-compliance-api:latest
    container_name: maemo-compliance-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:8090:8080'
    env_file: /opt/maemo-compliance/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MaemoDatabase: ${ConnectionStrings__MaemoDatabase:?}
      Storage__ForceLocalFileStorage: ${Storage__ForceLocalFileStorage:-true}
      Storage__LocalBasePath: ${Storage__LocalBasePath:-/app/files}
      Authentication__Authority: ${AZURE_AUTHORITY:?}
      Authentication__Audience: ${AZURE_AUDIENCE:?}
      Resend__ApiKey: ${Resend__ApiKey:-}
      Resend__FromAddress: ${Resend__FromAddress:-admin@maemo-compliance.co.za}
      App__PublicPortalUrl: ${App__PublicPortalUrl:-https://maemo-compliance.co.za}
    volumes:
      - maemo_compliance_files:/app/files
    networks:
      - maemo-compliance-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  workers:
    image: ghcr.io/ntokyb/maemo-compliance-workers:latest
    container_name: maemo-compliance-workers
    restart: unless-stopped
    env_file: /opt/maemo-compliance/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MaemoDatabase: ${ConnectionStrings__MaemoDatabase:?}
      Storage__ForceLocalFileStorage: ${Storage__ForceLocalFileStorage:-true}
      Storage__LocalBasePath: ${Storage__LocalBasePath:-/app/files}
    volumes:
      - maemo_compliance_files:/app/files
    networks:
      - maemo-compliance-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/ntokyb/maemo-compliance-portal:latest
    container_name: maemo-compliance-portal
    restart: unless-stopped
    ports:
      - '127.0.0.1:3020:80'
    networks:
      - maemo-compliance-network
    depends_on:
      api:
        condition: service_started

volumes:
  maemo_compliance_postgres_data:
  maemo_compliance_files:
