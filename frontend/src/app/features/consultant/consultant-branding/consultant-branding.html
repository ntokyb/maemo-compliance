<div class="consultant-branding-container">
  <div class="header">
    <h1>Branding & White-Label</h1>
    <p class="subtitle">Customize your consultant workspace appearance</p>
  </div>

  <form (ngSubmit)="save()" class="branding-form">
    <div class="form-section">
      <h2>Logo</h2>
      <div class="form-group">
        <label for="logo-input">Upload Logo</label>
        <input 
          type="file" 
          id="logo-input"
          accept="image/*" 
          (change)="onLogoSelected($event)"
          class="file-input">
        <div *ngIf="branding.logoUrl" class="preview">
          <img [src]="branding.logoUrl" alt="Logo preview" class="preview-image">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Colors</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="primary-color">Primary Color</label>
          <div class="color-input-group">
            <input 
              type="color" 
              id="primary-color"
              [(ngModel)]="branding.primaryColor" 
              name="primaryColor"
              class="color-input">
            <input 
              type="text" 
              [(ngModel)]="branding.primaryColor" 
              name="primaryColorText"
              placeholder="#007bff"
              class="color-text-input">
          </div>
        </div>

        <div class="form-group">
          <label for="secondary-color">Secondary Color</label>
          <div class="color-input-group">
            <input 
              type="color" 
              id="secondary-color"
              [(ngModel)]="branding.secondaryColor" 
              name="secondaryColor"
              class="color-input">
            <input 
              type="text" 
              [(ngModel)]="branding.secondaryColor" 
              name="secondaryColorText"
              placeholder="#6c757d"
              class="color-text-input">
          </div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Login Banner</h2>
      <div class="form-group">
        <label for="banner-input">Upload Login Banner</label>
        <input 
          type="file" 
          id="banner-input"
          accept="image/*" 
          (change)="onBannerSelected($event)"
          class="file-input">
        <div *ngIf="branding.loginBannerUrl" class="preview">
          <img [src]="branding.loginBannerUrl" alt="Banner preview" class="preview-image banner-preview">
        </div>
      </div>
    </div>

    <div *ngIf="error" class="error">
      <strong>Error:</strong> {{ error }}
    </div>

    <div *ngIf="success" class="success">
      Branding saved successfully!
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="saving" class="save-btn">
        {{ saving ? 'Saving...' : 'Save Branding' }}
      </button>
    </div>
  </form>
</div>
