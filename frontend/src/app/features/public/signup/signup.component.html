<div class="public-page">
  <app-public-header />
  <main class="contain">
    <h1>Request access</h1>
    <p class="lead">
      Tell us about your organisation. Our team reviews every request and will follow up within one business day.
    </p>

    <div *ngIf="success" class="banner ok">
      Request received! We will review your application and contact you within 1 business day.
    </div>

    <form *ngIf="!success" [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div *ngIf="error" class="banner err">{{ error }}</div>

      <label>Company name <span class="req">*</span></label>
      <input type="text" formControlName="companyName" class="ctrl" />

      <label>Industry <span class="req">*</span></label>
      <select formControlName="industry" class="ctrl">
        <option *ngFor="let i of industries" [value]="i">{{ i }}</option>
      </select>

      <label>Company size <span class="req">*</span></label>
      <select formControlName="companySize" class="ctrl">
        <option *ngFor="let s of companySizes" [value]="s">{{ s }}</option>
      </select>

      <label>Your name <span class="req">*</span></label>
      <input type="text" formControlName="contactName" class="ctrl" />

      <label>Your email <span class="req">*</span></label>
      <input type="email" formControlName="contactEmail" class="ctrl" autocomplete="email" />

      <label>Your role <span class="req">*</span></label>
      <select formControlName="contactRole" class="ctrl">
        <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
      </select>

      <fieldset class="iso">
        <legend>ISO standards you are targeting <span class="req">*</span></legend>
        <label class="chk"><input type="checkbox" formControlName="iso9001" /> ISO 9001</label>
        <label class="chk"><input type="checkbox" formControlName="iso14001" /> ISO 14001</label>
        <label class="chk"><input type="checkbox" formControlName="iso45001" /> ISO 45001</label>
        <label class="chk"><input type="checkbox" formControlName="iso27001" /> ISO 27001</label>
        <label class="chk"><input type="checkbox" formControlName="isoOther" /> Other</label>
      </fieldset>

      <label>How did you hear about us? <span class="req">*</span></label>
      <select formControlName="referralSource" class="ctrl">
        <option *ngFor="let o of referralOptions" [value]="o">{{ o }}</option>
      </select>

      <button type="submit" class="btn primary" [disabled]="submitting">
        {{ submitting ? 'Sending…' : 'Request access' }}
      </button>
    </form>
  </main>
  <app-public-footer />
</div>
