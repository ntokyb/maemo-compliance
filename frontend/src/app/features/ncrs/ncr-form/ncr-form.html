<div class="ncr-form-container">
  <div class="header">
    <h1>Create NCR</h1>
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <form [formGroup]="ncrForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input 
        type="text" 
        id="title" 
        formControlName="title"
        class="form-control"
        [class.invalid]="ncrForm.get('title')?.invalid && ncrForm.get('title')?.touched">
      <div *ngIf="ncrForm.get('title')?.invalid && ncrForm.get('title')?.touched" class="error-message">
        <div *ngIf="ncrForm.get('title')?.errors?.['required']">Title is required</div>
        <div *ngIf="ncrForm.get('title')?.errors?.['maxlength']">Title must not exceed 200 characters</div>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea 
        id="description" 
        formControlName="description"
        rows="5"
        class="form-control"
        [class.invalid]="ncrForm.get('description')?.invalid && ncrForm.get('description')?.touched"></textarea>
      <div *ngIf="ncrForm.get('description')?.invalid && ncrForm.get('description')?.touched" class="error-message">
        <div *ngIf="ncrForm.get('description')?.errors?.['required']">Description is required</div>
      </div>
    </div>

    <div class="form-group">
      <label for="department">Department</label>
      <input 
        type="text" 
        id="department" 
        formControlName="department"
        class="form-control"
        [class.invalid]="ncrForm.get('department')?.invalid && ncrForm.get('department')?.touched">
      <div *ngIf="ncrForm.get('department')?.invalid && ncrForm.get('department')?.touched" class="error-message">
        <div *ngIf="ncrForm.get('department')?.errors?.['maxlength']">Department must not exceed 100 characters</div>
      </div>
    </div>

    <div class="form-group">
      <label for="ownerUserId">Owner User ID</label>
      <input 
        type="text" 
        id="ownerUserId" 
        formControlName="ownerUserId"
        class="form-control">
    </div>

    <div class="form-group">
      <label for="severity">Severity <span class="required">*</span></label>
      <select id="severity" formControlName="severity" class="form-control">
        <option *ngFor="let option of severityOptions" [value]="option.value">
          {{ option.label }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="dueDate">Due Date</label>
      <input 
        type="date" 
        id="dueDate" 
        formControlName="dueDate"
        class="form-control">
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="saving">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving || ncrForm.invalid">
        {{ saving ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </form>
</div>
