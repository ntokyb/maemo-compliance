<div class="login-container" [style.background-image]="branding?.loginBannerUrl ? 'url(' + branding?.loginBannerUrl + ')' : ''">
  <div class="login-card">
    <img *ngIf="branding?.logoUrl" [src]="branding?.logoUrl" alt="Logo" class="login-logo">
    <h1>Maemo Portal</h1>
    <p>Sign in to access the Maemo Governance, Risk & Compliance system</p>
    <button (click)="login()" class="login-btn" [style.background-color]="branding?.primaryColor || ''">Sign in with Microsoft</button>
    <p class="signup-hint"><a routerLink="/signup">Create a new company workspace</a></p>
    
    <!-- Demo Mode Option -->
    <div class="demo-section">
      <div class="demo-divider">
        <span>or</span>
      </div>
      <button 
        (click)="switchToDemo()" 
        [disabled]="demoLoading"
        class="demo-btn">
        <span *ngIf="!demoLoading">Explore Demo Manufacturing Co.</span>
        <span *ngIf="demoLoading">Loading...</span>
      </button>
      <div *ngIf="demoError" class="demo-error">{{ demoError }}</div>
    </div>
  </div>
</div>
