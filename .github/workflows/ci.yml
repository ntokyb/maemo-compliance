# maemo-compliance: .NET 8 backend (MaemoCompliance.sln) + Angular portal (frontend/).
# Tests: MaemoCompliance.UnitTests / MaemoCompliance.IntegrationTests (Testcontainers; Docker on runner).
#
# Deploy: If you use GitHub Environment secrets, they OVERRIDE repository secrets for the same name.
# Blank environment secrets → empty host/user/key and "missing server host". Either define real values
# on Environment "production", or remove those environment secrets and rely on repository secrets only.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build MaemoCompliance.sln -c Release

      - name: Run unit tests
        run: dotnet test MaemoCompliance.UnitTests/MaemoCompliance.UnitTests.csproj -c Release --no-build

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build MaemoCompliance.sln -c Release

      - name: Run integration tests
        run: dotnet test MaemoCompliance.IntegrationTests/MaemoCompliance.IntegrationTests.csproj -c Release --no-build
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit, integration]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Production build (Angular)
        run: npm run build

  playwright-smoke:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [unit, integration]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: e2e/maemo-compliance

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e/maemo-compliance

      - name: Run smoke tests only
        run: npx playwright test --grep @smoke
        working-directory: e2e/maemo-compliance
        env:
          MAEMO_URL: ${{ secrets.MAEMO_COMPLIANCE_STAGING_URL }}
          MAEMO_API_URL: ${{ secrets.MAEMO_COMPLIANCE_API_STAGING_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-maemo
          path: e2e/maemo-compliance/playwright-report/

  docker-build:
    name: Build and push Docker images
    needs: [unit, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/ntokyb/maemo-compliance-api:latest
            ghcr.io/ntokyb/maemo-compliance-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.portal
          push: true
          tags: |
            ghcr.io/ntokyb/maemo-compliance-portal:latest
            ghcr.io/ntokyb/maemo-compliance-portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Workers image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.workers
          push: true
          tags: |
            ghcr.io/ntokyb/maemo-compliance-workers:latest
            ghcr.io/ntokyb/maemo-compliance-workers:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    needs: [unit, integration, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Verify SSH secrets and private key format
        shell: bash
        env:
          SSH_HOST: ${{ secrets.MAEMO_COMPLIANCE_SSH_HOST }}
          SSH_USER: ${{ secrets.MAEMO_COMPLIANCE_SSH_USER }}
          SSH_KEY: ${{ secrets.MAEMO_COMPLIANCE_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SSH_HOST}" ]]; then
            echo "::error::MAEMO_COMPLIANCE_SSH_HOST is empty. If using Environment 'production', remove blank env secrets (they override repo secrets)."
            exit 1
          fi
          if [[ -z "${SSH_USER}" ]]; then
            echo "::error::MAEMO_COMPLIANCE_SSH_USER is empty."
            exit 1
          fi
          if [[ -z "${SSH_KEY}" ]]; then
            echo "::error::MAEMO_COMPLIANCE_SSH_KEY is empty — use the server login key (BEGIN OPENSSH PRIVATE KEY), not the GitHub deploy key unless it is the same file."
            exit 1
          fi
          if ! printf '%s' "${SSH_KEY}" | grep -qE 'BEGIN (RSA|OPENSSH|EC) PRIVATE KEY'; then
            echo "::error::MAEMO_COMPLIANCE_SSH_KEY must be a full private key (BEGIN/END lines, Unix newlines)."
            exit 1
          fi
          echo "SSH preflight OK."

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.MAEMO_COMPLIANCE_SSH_HOST }}
          username: ${{ secrets.MAEMO_COMPLIANCE_SSH_USER }}
          key: ${{ secrets.MAEMO_COMPLIANCE_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          script_stop: true
          script: |
            set -e
            cd /opt/maemo-compliance/app
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file /opt/maemo-compliance/.env -f docker-compose.prod.yml pull
            docker compose --env-file /opt/maemo-compliance/.env -f docker-compose.prod.yml up -d --remove-orphans
            sleep 10
            curl -f http://localhost:8090/health/live \
              || (docker compose --env-file /opt/maemo-compliance/.env -f docker-compose.prod.yml logs --tail 20 && exit 1)
            echo "Deploy complete"
