# maemo-compliance: .NET 8 backend (MaemoCompliance.sln) + Angular portal (frontend/).
# Tests: MaemoCompliance.UnitTests / MaemoCompliance.IntegrationTests (Testcontainers; Docker on runner).

name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build MaemoCompliance.sln -c Release

      # Separate test projects (no xUnit Category=Unit/Integration traits).
      - name: Run unit tests
        run: dotnet test MaemoCompliance.UnitTests/MaemoCompliance.UnitTests.csproj -c Release --no-build

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build MaemoCompliance.sln -c Release

      - name: Run integration tests
        run: dotnet test MaemoCompliance.IntegrationTests/MaemoCompliance.IntegrationTests.csproj -c Release --no-build
        env:
          # GitHub-hosted runners: Docker is available for Testcontainers PostgreSQL.
          TESTCONTAINERS_RYUK_DISABLED: true

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit, integration]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Production build (Angular)
        run: npm run build

      # Optional: billable Playwright against staging (uncomment when you have e2e/ + config).
      # - run: npx playwright install --with-deps chromium
      # - run: npx playwright test --project=billable
      #   env:
      #     BILLABLE_URL: ${{ secrets.MAEMO_COMPLIANCE_STAGING_URL }}

  playwright-smoke:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [unit, integration]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: e2e/maemo-compliance

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e/maemo-compliance

      - name: Run smoke tests only
        run: npx playwright test --grep @smoke
        working-directory: e2e/maemo-compliance
        env:
          MAEMO_URL: ${{ secrets.MAEMO_COMPLIANCE_STAGING_URL }}
          MAEMO_API_URL: ${{ secrets.MAEMO_COMPLIANCE_API_STAGING_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-maemo
          path: e2e/maemo-compliance/playwright-report/

  deploy:
    needs: [frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MAEMO_COMPLIANCE_SSH_HOST }}
          username: ${{ secrets.MAEMO_COMPLIANCE_SSH_USER }}
          key: ${{ secrets.MAEMO_COMPLIANCE_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/maemo-compliance/app
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
