# Local full stack — Postgres, API, workers, frontend (nginx).
# Copy .env.example to .env and set AZURE_* values before `docker compose up`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: maemo-compliance-postgres
    environment:
      POSTGRES_DB: maemo
      POSTGRES_USER: maemo
      POSTGRES_PASSWORD: maemo_dev_password
    ports:
      - "5433:5432"
    volumes:
      - maemo_compliance_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maemo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: MaemoCompliance.Api/Dockerfile
    image: ghcr.io/ntokyb/maemo-compliance-api:local
    container_name: maemo-compliance-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MaemoDatabase: "Host=postgres;Port=5432;Database=maemo;Username=maemo;Password=maemo_dev_password"
      Storage__ForceLocalFileStorage: "true"
      Storage__LocalBasePath: /app/files
      Authentication__Authority: ${AZURE_AUTHORITY:-https://login.microsoftonline.com/common/v2.0}
      Authentication__Audience: ${AZURE_AUDIENCE:-api://maemo-api-client-id}
      Admin__DemoSeedApiKey: ${ADMIN__DEMO_SEED_API_KEY:-}
    volumes:
      - maemo_compliance_file_storage:/app/files
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  workers:
    build:
      context: .
      dockerfile: workers/src/MaemoCompliance.Workers/Dockerfile
    image: ghcr.io/ntokyb/maemo-compliance-workers:local
    container_name: maemo-compliance-workers
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MaemoDatabase: "Host=postgres;Port=5432;Database=maemo;Username=maemo;Password=maemo_dev_password"
      Storage__ForceLocalFileStorage: "true"
      Storage__LocalBasePath: /app/files
    volumes:
      - maemo_compliance_file_storage:/app/files
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/ntokyb/maemo-compliance-portal:local
    container_name: maemo-compliance-portal
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  maemo_compliance_postgres_data:
  maemo_compliance_file_storage:
